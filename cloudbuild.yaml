steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-f"
      - "Dockerfile.deploy"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw:latest"
      - "."
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw:latest"
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lucky-draw
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw:latest"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - managed
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "256Mi"
      - "--max-instances"
      - "3"
      - "--project"
      - "$PROJECT_ID"

substitutions:
  _REGION: asia-east1

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/lucky-draw:latest"

options:
  logging: CLOUD_LOGGING_ONLY
